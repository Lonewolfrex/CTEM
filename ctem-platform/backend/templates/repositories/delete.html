{% extends "base.html" %}

{% block content %}

<div class="page-header">

    <div>
        <h1>Delete Repository</h1>
        <p>
            Confirm repository removal.
        </p>
    </div>

</div>

<div class="card">

    <h3>
        Are you sure you want to delete
        "{{ repository.name }}"?
    </h3>

    <p>
        This action cannot be undone.
    </p>

    <form method="post">

        {% csrf_token %}

        <div style="display:flex;gap:12px;">

            <button
                type="submit"
                class="btn-danger"
            >
                Delete Repository
            </button>

            <a
                href="{% url 'repositories:detail' repository.id %}"
                class="btn-primary"
            >
                Cancel
            </a>

        </div>

    </form>

</div>

{% endblock %}
