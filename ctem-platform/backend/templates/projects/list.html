{% extends "base.html" %}

{% block content %}

<h1>Projects</h1>

<div class="ctem-card">

<table class="ctem-table">

<thead>
<tr>
    <th>Name</th>
    <th>Description</th>
</tr>
</thead>

<tbody>

{% for project in projects %}
<tr>
    <td>{{ project.name }}</td>
    <td>{{ project.description }}</td>
</tr>
{% empty %}
<tr>
    <td colspan="2">No Projects</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
